<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>สแกน QR Code</title>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: #0f172a;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: #16a34a;
    padding: 16px;
    text-align: center;
    z-index: 10;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p  { font-size: 13px; opacity: 0.85; margin-top: 2px; }

  /* VIDEO */
  .video-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SCAN FRAME */
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 240px;
    height: 240px;
    position: relative;
  }
  .scan-frame::before,
  .scan-frame::after,
  .corner-br,
  .corner-bl {
    content: '';
    position: absolute;
    width: 36px;
    height: 36px;
    border-color: #4ade80;
    border-style: solid;
  }
  .scan-frame::before { top: 0; left: 0; border-width: 4px 0 0 4px; border-radius: 4px 0 0 4px; }
  .scan-frame::after  { top: 0; right: 0; border-width: 4px 4px 0 0; border-radius: 0 4px 0 0; }
  .corner-br { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }
  .corner-bl { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-radius: 0 0 0 4px; }

  /* SCAN LINE */
  .scan-line {
    position: absolute;
    left: 4px;
    right: 4px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4ade80, transparent);
    animation: scanMove 2s linear infinite;
    top: 4px;
  }
  @keyframes scanMove {
    0%   { top: 4px; }
    100% { top: calc(100% - 6px); }
  }

  /* DARK OVERLAY around frame */
  .dark-top    { position: absolute; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); }
  .dark-bottom { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); }
  .dark-left   { position: absolute; background: rgba(0,0,0,0.5); }
  .dark-right  { position: absolute; background: rgba(0,0,0,0.5); }

  /* INSTRUCTION */
  .instruction {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px;
    background: rgba(0,0,0,0.6);
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    flex-shrink: 0;
  }

  /* SUCCESS STATE */
  #success {
    display: none;
    position: absolute;
    inset: 0;
    background: #16a34a;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  #success.show { display: flex; }
  #success .icon { font-size: 72px; }
  #success h2 { font-size: 22px; font-weight: 700; }
  #success .tracking { 
    font-size: 20px; 
    font-weight: 700;
    font-family: monospace;
    background: rgba(255,255,255,0.2);
    padding: 12px 24px;
    border-radius: 12px;
    letter-spacing: 1px;
    word-break: break-all;
  }
  #success p { font-size: 14px; opacity: 0.85; }

  /* ERROR STATE */
  #error-msg {
    display: none;
    position: absolute;
    bottom: 60px;
    left: 16px;
    right: 16px;
    background: #ef4444;
    color: white;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
  }
  #error-msg.show { display: block; }

  /* CANCEL BUTTON */
  .btn-cancel {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 10px 28px;
    border-radius: 20px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    cursor: pointer;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📷 สแกน QR Code</h1>
  <p>จ่อกล้องไปที่ QR Code บนพัสดุ</p>
</div>

<div class="video-wrap">
  <video id="video" playsinline autoplay muted></video>

  <!-- DARK OVERLAY -->
  <div class="scan-overlay">
    <div class="scan-frame">
      <div class="scan-line"></div>
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="success">
    <div class="icon">✅</div>
    <h2>สแกนสำเร็จ!</h2>
    <div class="tracking" id="result-text"></div>
    <p>กำลังกลับไปที่แบบฟอร์ม...</p>
  </div>

  <!-- ERROR -->
  <div id="error-msg"></div>

  <!-- CANCEL -->
  <button class="btn-cancel" onclick="cancelScan()">✕ ยกเลิก</button>
</div>

<script>
  let codeReader = null;
  let returnUrl = "";

  window.onload = function() {
    // Get return URL from query parameter
    const params = new URLSearchParams(window.location.search);
    returnUrl = params.get("return") || "";

    startScanner();
  };

  function startScanner() {
    codeReader = new ZXing.BrowserMultiFormatReader();

    codeReader.listVideoInputDevices().then(function(devices) {
      if (devices.length === 0) {
        showError("ไม่พบกล้อง กรุณาอนุญาตการเข้าถึงกล้อง");
        return;
      }

      // Prefer back camera
      const backCamera = devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear") ||
        d.label.toLowerCase().includes("environment")
      ) || devices[devices.length - 1];

      codeReader.decodeFromVideoDevice(
        backCamera.deviceId,
        "video",
        function(result, err) {
          if (result) {
            onScanSuccess(result.getText());
          }
          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error(err);
          }
        }
      );
    }).catch(function(err) {
      showError("ไม่สามารถเปิดกล้องได้: " + err.message);
    });
  }

  function onScanSuccess(text) {
    // Stop scanner
    if (codeReader) { codeReader.reset(); codeReader = null; }

    // Vibrate on success
    if (navigator.vibrate) navigator.vibrate(200);

    // Show success screen
    document.getElementById("result-text").textContent = text;
    document.getElementById("success").classList.add("show");

    // Redirect back to form after 1.5 seconds
    setTimeout(function() {
      if (returnUrl) {
        window.location.href = returnUrl + "&scanned=" + encodeURIComponent(text);
      }
    }, 1500);
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 4000);
  }

  function cancelScan() {
    if (codeReader) { codeReader.reset(); codeReader = null; }
    if (returnUrl) {
      window.location.href = returnUrl;
    } else {
      window.history.back();
    }
  }
</script>
</body>
</html>
