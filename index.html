<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>สแกน QR Code</title>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: #0f172a;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: #16a34a;
    padding: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p  { font-size: 13px; opacity: 0.85; margin-top: 2px; }

  /* PERMISSION SCREEN */
  #permission-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    gap: 16px;
  }
  #permission-screen .icon { font-size: 64px; }
  #permission-screen h2 { font-size: 20px; font-weight: 700; }
  #permission-screen p { font-size: 15px; opacity: 0.75; line-height: 1.6; }
  .btn-allow {
    margin-top: 8px;
    padding: 16px 40px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Sarabun', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }

  /* SCANNER SCREEN */
  #scanner-screen {
    display: none;
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SCAN FRAME */
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 240px;
    height: 240px;
    position: relative;
  }
  .scan-frame::before,
  .scan-frame::after,
  .corner-br,
  .corner-bl {
    content: '';
    position: absolute;
    width: 36px;
    height: 36px;
    border-color: #4ade80;
    border-style: solid;
  }
  .scan-frame::before { top: 0; left: 0; border-width: 4px 0 0 4px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { top: 0; right: 0; border-width: 4px 4px 0 0; border-radius: 0 4px 0 0; }
  .corner-br { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }
  .corner-bl { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-radius: 0 0 0 4px; }

  .scan-line {
    position: absolute;
    left: 4px; right: 4px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4ade80, transparent);
    animation: scanMove 2s linear infinite;
    top: 4px;
  }
  @keyframes scanMove {
    0%   { top: 4px; }
    100% { top: calc(100% - 6px); }
  }

  .instruction {
    position: absolute;
    bottom: 60px;
    left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  /* SUCCESS */
  #success {
    display: none;
    position: absolute;
    inset: 0;
    background: #16a34a;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  #success.show { display: flex; }
  #success .icon { font-size: 72px; }
  #success h2 { font-size: 22px; font-weight: 700; }
  #success .tracking {
    font-size: 18px;
    font-weight: 700;
    font-family: monospace;
    background: rgba(255,255,255,0.2);
    padding: 12px 24px;
    border-radius: 12px;
    letter-spacing: 1px;
    word-break: break-all;
  }
  #success p { font-size: 14px; opacity: 0.85; }

  /* ERROR */
  #error-box {
    display: none;
    position: absolute;
    inset: 0;
    background: #0f172a;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 32px 24px;
  }
  #error-box.show { display: flex; }
  #error-box .icon { font-size: 56px; }
  #error-box h2 { font-size: 18px; font-weight: 700; color: #ef4444; }
  #error-box p { font-size: 14px; opacity: 0.75; line-height: 1.6; }
  .btn-retry {
    padding: 14px 32px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-cancel {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 10px 28px;
    border-radius: 20px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    cursor: pointer;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📷 สแกน QR Code</h1>
  <p>จ่อกล้องไปที่ QR Code บนพัสดุ</p>
</div>

<!-- STEP 1: ASK PERMISSION -->
<div id="permission-screen">
  <div class="icon">📷</div>
  <h2>ขออนุญาตใช้กล้อง</h2>
  <p>แอปนี้ต้องการเข้าถึงกล้องของคุณ<br>เพื่อสแกน QR Code บนพัสดุ</p>
  <button class="btn-allow" onclick="requestCamera()">
    อนุญาตและเปิดกล้อง
  </button>
</div>

<!-- STEP 2: SCANNER -->
<div id="scanner-screen">
  <video id="video" playsinline autoplay muted></video>

  <div class="scan-overlay">
    <div class="scan-frame">
      <div class="scan-line"></div>
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
    </div>
  </div>

  <div class="instruction">จ่อ QR Code ให้อยู่ในกรอบสีเขียว</div>

  <!-- SUCCESS OVERLAY -->
  <div id="success">
    <div class="icon">✅</div>
    <h2>สแกนสำเร็จ!</h2>
    <div class="tracking" id="result-text"></div>
    <p>กำลังกลับไปที่แบบฟอร์ม...</p>
  </div>

  <button class="btn-cancel" onclick="cancelScan()">✕ ยกเลิก</button>
</div>

<!-- ERROR SCREEN -->
<div id="error-box">
  <div class="icon">🚫</div>
  <h2>ไม่สามารถเปิดกล้องได้</h2>
  <p id="error-detail">กรุณาอนุญาตการเข้าถึงกล้องในการตั้งค่าของบราวเซอร์ แล้วลองใหม่อีกครั้ง</p>
  <button class="btn-retry" onclick="requestCamera()">ลองใหม่</button>
  <button class="btn-cancel" style="position:relative; bottom:auto; left:auto; transform:none; margin-top:4px;" onclick="cancelScan()">ยกเลิก</button>
</div>

<script>
  let codeReader = null;
  let returnUrl = "";

  window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    returnUrl = params.get("return") || "";
  };

  async function requestCamera() {
    try {
      // Explicitly request camera permission first
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });

      // Permission granted — stop the test stream and start ZXing
      stream.getTracks().forEach(t => t.stop());

      // Show scanner screen
      document.getElementById("permission-screen").style.display = "none";
      document.getElementById("scanner-screen").style.display = "block";

      startScanner();

    } catch(err) {
      // Permission denied or error
      document.getElementById("permission-screen").style.display = "none";
      document.getElementById("error-detail").textContent =
        err.name === "NotAllowedError"
          ? "คุณปฏิเสธการเข้าถึงกล้อง กรุณาไปที่การตั้งค่าบราวเซอร์และอนุญาตการใช้กล้อง"
          : "เกิดข้อผิดพลาด: " + err.message;
      document.getElementById("error-box").classList.add("show");
    }
  }

  function startScanner() {
    codeReader = new ZXing.BrowserMultiFormatReader();

    codeReader.listVideoInputDevices().then(function(devices) {
      if (devices.length === 0) {
        showError("ไม่พบกล้องในอุปกรณ์นี้");
        return;
      }

      const backCamera = devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear") ||
        d.label.toLowerCase().includes("environment")
      ) || devices[devices.length - 1];

      codeReader.decodeFromVideoDevice(
        backCamera.deviceId,
        "video",
        function(result, err) {
          if (result) onScanSuccess(result.getText());
          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error(err);
          }
        }
      );
    }).catch(function(err) {
      showError("ไม่สามารถเปิดกล้องได้: " + err.message);
    });
  }

  function onScanSuccess(text) {
    if (codeReader) { codeReader.reset(); codeReader = null; }
    if (navigator.vibrate) navigator.vibrate(200);

    document.getElementById("result-text").textContent = text;
    document.getElementById("success").classList.add("show");

    // Send result back to form tab via localStorage
    localStorage.setItem("qr_scanned", text);

    // Close this tab after 1.5 seconds
    setTimeout(function() {
      window.close();
    }, 1500);
  }

  function showError(msg) {
    document.getElementById("error-detail").textContent = msg;
    document.getElementById("scanner-screen").style.display = "none";
    document.getElementById("error-box").classList.add("show");
  }

  function cancelScan() {
    if (codeReader) { codeReader.reset(); codeReader = null; }
    if (returnUrl) {
      window.location.href = returnUrl;
    } else {
      window.history.back();
    }
  }
</script>
</body>
</html>
